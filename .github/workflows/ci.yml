name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12

      - run: uv sync --extra dev

      - run: uv run pytest -m "not smoke" -v

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12

      - run: uv sync --extra dev

      - run: uv run pytest -m smoke -v --timeout=120
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
